name: AIQ Docker CI/CD

on:
  push:
    branches: [ "main" ] # main 브랜치에 push하면 실행

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        working-directory: ./AIQ
        run: ./gradlew bootJar -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 유성님 도커 허브 ID/이미지이름:버전
          tags: ${{ secrets.DOCKER_USERNAME }}/aiq-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH Remote Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root # 유성님 서버 접속 계정
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. 기존 컨테이너 중지 및 삭제
            docker stop aiq-backend || true
            docker rm aiq-backend || true
            
            # 2. 최신 이미지 내려받기
            docker pull ${{ secrets.DOCKER_USERNAME }}/aiq-backend:latest
            
            # 3. 새 컨테이너 실행
            # --network aiq-network를 통해 DB(aiq-postgres)와 통신
            docker run -d --name aiq-backend \
              -p 8080:8080 \
              --network aiq-network \
              -e SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e SERVER_FORWARD_HEADERS_STRATEGY=native \
              ${{ secrets.DOCKER_USERNAME }}/aiq-backend:latest
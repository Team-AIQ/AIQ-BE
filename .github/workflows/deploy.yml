name: AIQ Docker CI/CD

on:
  push:
    branches: [ "main" ] # main 브랜치에 push하면 실행

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        working-directory: ./AIQ
        run: |
          chmod +x ./gradlew
          ./gradlew bootJar -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./AIQ
          file: ./AIQ/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/aiq-backend:latest

  # ⚠️ 여기 deploy 앞에 공백 2칸을 추가하여 jobs 안에 포함시켰습니다.
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH Remote Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            # 1. 이름이 aiq-backend인 컨테이너와 8080포트를 쓰는 컨테이너 모두 중지 및 삭제
            docker stop aiq-backend || true
            docker rm -f aiq-backend || true
            docker rm -f $(docker ps -aq --filter "publish=8080") || true
            
            # 2. 최신 이미지 가져오기
            docker pull ${{ secrets.DOCKER_USERNAME }}/aiq-backend:latest
            
            # 3. 새 컨테이너 실행
            docker run -d --name aiq-backend \
              -p 8080:8080 \
              --network aiq-network \
              -e SPRING_DATASOURCE_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              -e SPRING_DATA_REDIS_HOST=aiq-redis \
              -e SERVER_FORWARD_HEADERS_STRATEGY=native \
              ${{ secrets.DOCKER_USERNAME }}/aiq-backend:latest
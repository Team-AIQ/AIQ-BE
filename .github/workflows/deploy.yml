name: AIQ Docker CI/CD

on:
  push:
    branches: [ "main" ] # main 브랜치에 push하면 실행

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        working-directory: ./AIQ
        run: |
          chmod +x ./gradlew
          ./gradlew bootJar -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          # context를 ./AIQ로 바꿔서 도커가 AIQ 폴더 안을 보게 합니다.
          context: ./AIQ
          # file 경로를 명확하게 지정해줍니다.
          file: ./AIQ/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/aiq-backend:latest

deploy:
  needs: build-and-push
  runs-on: ubuntu-latest
  steps:
    - name: SSH Remote Commands
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # 1. 기존 컨테이너 중지 및 삭제 (있으면 지우고 없으면 넘어감)
          docker stop aiq-backend || true
          docker rm aiq-backend || true
          
          # 2. 최신 이미지 강제 다운로드
          # 도커 허브 아이디를 직접 입력하거나 secrets를 사용하세요.
          docker pull ${{ secrets.DOCKER_USERNAME }}/aiq-backend:latest
          
          # 3. 새 컨테이너 실행
          docker run -d --name aiq-backend \
            -p 8080:8080 \
            --network aiq-network \
            -e SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e SPRING_DATA_REDIS_HOST=aiq-redis \
            -e SERVER_FORWARD_HEADERS_STRATEGY=native \
            ${{ secrets.DOCKER_USERNAME }}/aiq-backend:latest
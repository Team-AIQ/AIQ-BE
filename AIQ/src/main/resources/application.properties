spring.application.name=AIQ

# 1. \uB370\uC774\uD130\uBCA0\uC774\uC2A4 \uC5F0\uACB0 \uC124\uC815 (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. JPA \uBC0F \uD558\uC774\uBC84\uB124\uC774\uD2B8 \uC124\uC815
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# JSONB \uD578\uB4E4\uB9C1\uC744 \uC704\uD55C \uD558\uC774\uBC84\uB124\uC774\uD2B8 \uD0C0\uC785 \uC124\uC815
spring.jpa.properties.hibernate.type.descriptor.sql.extractors.json=io.hypersistence.utils.hibernate.type.json.JsonBinarySqlTypeDescriptor

# 3. \uBE44\uB3D9\uAE30 \uC131\uB2A5 \uCD5C\uC801\uD654 (Java 21+ Virtual Threads)
# AI \uD638\uCD9C \uB300\uAE30 \uC2DC \uC11C\uBC84 \uC790\uC6D0\uC744 \uD6A8\uC728\uC801\uC73C\uB85C \uC0AC\uC6A9\uD558\uAE30 \uC704\uD574 \uD544\uC218\uC785\uB2C8\uB2E4.
spring.threads.virtual.enabled=true

# 4. \uC678\uBD80 AI API \uD0A4 \uC124\uC815 (\uBCF4\uC548\uC744 \uC704\uD574 \uD658\uACBD\uBCC0\uC218 \uC0AC\uC6A9 \uAD8C\uC7A5)
# \uC608: \uC2DC\uC2A4\uD15C \uD658\uACBD\uBCC0\uC218\uC5D0 OPENAI_API_KEY\uAC00 \uC5C6\uC73C\uBA74 'default_key'\uB97C \uC0AC\uC6A9\uD569\uB2C8\uB2E4.
openai.api.key=${OPENAI_API_KEY}
google.api.key=${GOOGLE_API_KEY}
perplexity.api.key=${PERPLEXITY_API_KEY}
serper.api.key=${SERPER_API_KEY}
naver.client.id=${NAVER_CLIENT_ID}
naver.client.secret=${NAVER_CLIENT_SECRET}

# 5. AWS \uC778\uD504\uB77C \uC124\uC815 (S3 & CloudFront)
cloud.aws.s3.bucket=aiq-storage-bucket
cloud.aws.region.static=ap-northeast-2
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
cloud.aws.cloudfront.domain=https://your-distribution-id.cloudfront.net

# 6. \uBCF4\uC548 \uC124\uC815 (JWT)
# \uC6F9(Next.js)\uACFC \uC571(React Native) \uC778\uC99D\uC5D0 \uC0AC\uC6A9\uB429\uB2C8\uB2E4.
jwt.secret=${JWT_SECRET:very_secret_key_for_aiq_project_2026}
jwt.access-expiration=3600000
jwt.refresh-expiration=86400000

# \uCD94\uAC00: \uC790\uB3D9 \uB85C\uADF8\uC778\uC6A9 (30\uC77C = 30 * 24 * 60 * 60 * 1000)
jwt.remember-me-expiration=2592000000

# 7. \uB85C\uAE45 \uC124\uC815
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JSON \uC751\uB2F5 \uC2DC \uB0A0\uC9DC \uD615\uC2DD\uC744 ISO-8601\uB85C \uD1B5\uC77C
spring.jackson.serialization.write-dates-as-timestamps=false


# Google
spring.security.oauth2.client.registration.google.client-id=${OAUTH_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${OAUTH_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# Naver
spring.security.oauth2.client.registration.naver.client-id=${OAUTH_NAVER_CLIENT_ID}
spring.security.oauth2.client.registration.naver.client-secret=${OAUTH_NAVER_CLIENT_SECRET}
spring.security.oauth2.client.registration.naver.client-name=Naver
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.redirect-uri=http://localhost:8080/login/oauth2/code/naver
spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

# Kakao
spring.security.oauth2.client.registration.kakao.client-id=${OAUTH_KAKAO_CLIENT_ID}
spring.security.oauth2.client.registration.kakao.client-secret=${OAUTH_KAKAO_CLIENT_SECRET}
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/kakao
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id



# Brevo SMTP \uC124\uC815 (Gmail \uB300\uCCB4)
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=a2ac7b001@smtp-brevo.com
spring.mail.password=${SMTP_PASSWORD}

# \uBCF4\uC548 \uBC0F \uC131\uB2A5 \uC124\uC815
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# \uD0C0\uC784\uC544\uC6C3 \uC124\uC815 (\uAE30\uC874 \uC124\uC815 \uC720\uC9C0)
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
# Email\uC778\uC99D \uAD00\uB828 \uC124\uC815
spring.data.redis.host=localhost
spring.data.redis.port=6379

admob.ssv.key-server-url: https://www.gstatic.com/admob/reward/verifier-keys.json
